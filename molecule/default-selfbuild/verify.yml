---
- name: Verify Mozhi systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Mozhi service to become active (up to 180s)
      ansible.builtin.systemd:
        name: mozhi.service
      register: mozhi_service
      until: mozhi_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Mozhi service is active
      ansible.builtin.assert:
        that: mozhi_service.status.ActiveState == 'active'
        fail_msg: "mozhi.service not active ({{ mozhi_service.status.ActiveState }})"
        success_msg: "mozhi.service is active"

    - name: Retrieve Mozhi service log for debugging
      when: mozhi_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu mozhi.service
      changed_when: false

    - name: Wait for Mozhi HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:3000/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: mozhi_endpoint
      until: mozhi_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Mozhi HTTP endpoint responds
      ansible.builtin.assert:
        that: mozhi_endpoint.status in [200, 302]
        fail_msg: "Mozhi did not respond as expected ({{ mozhi_endpoint.status | default('no response') }})"
        success_msg: "Mozhi responded with {{ mozhi_endpoint.status }}"

    - name: Show Mozhi systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Mozhi systemd: {{ mozhi_service.status.ActiveState }}"
          - "Mozhi HTTP: {{ mozhi_endpoint.status }}"
